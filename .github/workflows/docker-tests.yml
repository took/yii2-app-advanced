name: Docker Tests

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:

jobs:
  docker-tests:
    name: Docker Test Environment
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Run tests in Docker
        run: |
          cd docker
          export COMPOSE_DOCKER_CLI_BUILD=1
          export DOCKER_BUILDKIT=1
          docker compose -f docker-compose.tests.yml up --build --abort-on-container-exit 2>&1

      - name: Capture test results
        if: always()
        run: |
          # Check if test container exited with success
          EXIT_CODE=$(docker ps -a --filter "name=app-tests" --format "{{.Status}}" | grep -o "Exited (0)" || true)
          if [ -z "$EXIT_CODE" ]; then
            echo "Tests failed or container did not exit cleanly"
            exit 1
          fi
          echo "Docker tests completed successfully"

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-output
          path: |
            api/tests/_output/
            backoffice/tests/_output/
            common/tests/_output/
            console/tests/_output/
            frontpage/tests/_output/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          cd docker
          docker compose -f docker-compose.tests.yml down -v || true
