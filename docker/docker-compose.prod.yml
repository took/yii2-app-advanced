services:

  app-prod:
    build: prod
    ports:
      - 20080:80
      - 20081:8081
      - 20082:8082
    volumes:
      # Re-use local composer cache via host-volume
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
    environment:
      - YII_ENV=dev
      - YII_DEBUG=true
      - DB_NAME=yii2advanced_dev
    depends_on:
      - mysql-yii2advanced-dev
    networks:
      - yii2-dev-network

  mysql-yii2advanced-prod:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=verysecret
      - MYSQL_DATABASE=yii2advanced
      - MYSQL_USER=yii2advanced
      - MYSQL_PASSWORD=secret

